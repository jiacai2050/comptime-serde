name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.zig'
      - '**.yml'
  push:
    branches:
      - main
    paths:
      - '**.zig'
      - '**.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
      - name: Install Protoc
        uses: step-security/setup-protoc@v3
      - name: fmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          make lint
      - name: test
        run: |
          make test
      - name: serde-gen tests
        if: matrix.os != 'windows-latest'
        run: |
          zig build
          ./tests/test-serde-gen.sh
